<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Fotobox Coswig mieten</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  body {margin:0; font-family: Arial, sans-serif; background:#0f172a; color:#fff;}
  header {position: relative; height: 70vh; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center; color:#fff; overflow:hidden;}
  header h1 {font-size:3em; margin-bottom:10px; text-shadow:2px2px6px rgba(0,0,0,0.6);}
  header p {font-size:1.5em; text-shadow:1px1px4px rgba(0,0,0,0.5);}
  .btn {display:inline-block; margin-top:20px; padding:12px 25px; background:#38bdf8; color:#000; text-decoration:none; border-radius:8px; font-weight:bold;}
  
  /* Slider Bilder */
  .slide {position:absolute; top:0; left:0; width:100%; height:100%; background-size:cover; background-position:center; opacity:0; transition:opacity 1s ease-in-out;}
  .slide.show {opacity:1;}
</style>
</head>
<body>

<header>
  <div class="slide" style="background-image:url('Hintergrund1.jpg')"></div>
  <div class="slide" style="background-image:url('Hintergrund2.jpg')"></div>
  <div class="slide" style="background-image:url('Hintergrund3.jpg')"></div>
  <div class="slide" style="background-image:url('Hintergrund4.jpg')"></div>
  
  <h1>📸 Fotobox Coswig</h1>
  <p>Fotobox Coswig mieten – Cloud Upload, Hintergründe & Nebelmaschine</p>
  <a href="#kontakt" class="btn">Jetzt anfragen</a>
</header>

<section id="kontakt">
  <h2>Kontakt</h2>
  <p>Email: fotobox.coswig@gmail.com</p>
  <p>Telefon: 01626968383</p>
</section>

<script>
  const slides = document.querySelectorAll('.slide');
  let current = 0;

  function showSlide(index){
    slides.forEach(slide => slide.classList.remove('show'));
    slides[index].classList.add('show');
  }

  showSlide(current);
  setInterval(()=>{
    current = (current + 1) % slides.length;
    showSlide(current);
  },5000); // Wechsel alle 5 Sekunden
</script>

</body>
</html>
